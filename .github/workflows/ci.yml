name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Setup Python venv
        run: |
          python3 -m venv .claude/skills/.venv
          .claude/skills/.venv/bin/pip install --quiet pyyaml jsonschema

      - name: Validate skill cross-refs
        run: bash scripts/check-skill-cross-refs.sh

      - name: Validate hook registration
        run: bash scripts/check-hook-registration.sh

      - name: Validate skill frontmatter
        run: .claude/skills/.venv/bin/python3 scripts/validate-skill-frontmatter.py

      - name: Reject residual mk: namespace
        run: |
          if grep -rEn '^name:[[:space:]]*mk:' .claude/skills/*/SKILL.md; then
            echo "ERROR: legacy 'mk:' frontmatter found — use 'mk:' instead." >&2
            exit 1
          fi
          if grep -rEn '/mk:[a-z]' .claude/commands/ .claude/rules/ CLAUDE.md 2>/dev/null; then
            echo "ERROR: legacy '/mk:' slash references found — use '/mk:' instead." >&2
            exit 1
          fi

      - name: Hook regression tests
        run: node --test ".claude/hooks/__tests__/*.test.cjs"
