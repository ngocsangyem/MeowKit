name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke-test memory CLI
        run: |
          node packages/mewkit/dist/index.js memory validate
          node packages/mewkit/dist/index.js memory render-views

      - name: Setup Python venv
        run: |
          python3 -m venv .claude/skills/.venv
          .claude/skills/.venv/bin/pip install --quiet pyyaml jsonschema

      - name: Validate skill cross-refs
        run: bash scripts/check-skill-cross-refs.sh

      - name: Validate hook registration
        run: bash scripts/check-hook-registration.sh

      - name: Validate hook shell consistency
        run: bash scripts/check-hook-shell-consistency.sh

      - name: Validate workflow spec drift
        run: node packages/mewkit/dist/index.js validate --workflow

      - name: Validate artifact ownership metadata
        run: node packages/mewkit/dist/index.js validate --ownership

      - name: Validate README/index counts (stale-index)
        run: node packages/mewkit/dist/index.js inventory --check

      - name: Validate skill frontmatter
        run: .claude/skills/.venv/bin/python3 scripts/validate-skill-frontmatter.py

      - name: Validate docs references on Type-1 allowlist
        run: python3 .claude/scripts/check-docs-references.py .claude

      - name: Unit-test docs-references validator
        run: python3 .claude/scripts/tests/test-check-docs-references.py

      - name: Validate rule availability
        run: bash scripts/validate-rule-availability.sh

      - name: Lint brand prose in .claude markdown
        run: bash .claude/scripts/lint-brand-prose.sh

      - name: "Reject residual meow: namespace"
        run: |
          if grep -rEn '^name:[[:space:]]*meow:' .claude/skills/*/SKILL.md; then
            echo "ERROR: legacy 'meow:' frontmatter found — use 'mk:' instead." >&2
            exit 1
          fi
          if grep -rEn '/meow:[a-z]' .claude/commands/ .claude/rules/ CLAUDE.md 2>/dev/null; then
            echo "ERROR: legacy '/meow:' slash references found — use '/mk:' instead." >&2
            exit 1
          fi

      - name: Hook regression tests
        run: node --test .claude/hooks/__tests__/*.test.cjs
