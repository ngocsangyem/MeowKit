name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so diff-mode lints can resolve a base ref (merge-base).
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build packages
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Wiki-research security corpus
        run: npx vitest run packages/mewkit/src/wiki/infrastructure/__tests__/fetcher-adapter.test.ts packages/mewkit/src/wiki/infrastructure/__tests__/scanner-adapter.test.ts packages/mewkit/src/wiki/application/__tests__/research-quarantine.test.ts

      - name: Validate visual-plan eval fixtures
        run: node scripts/validate-visual-plan-evals.cjs

      - name: Worktree command contract tests
        run: node .claude/skills/worktree/scripts/worktree.test.cjs

      - name: Sequential-thinking script tests
        run: bash .claude/skills/sequential-thinking/scripts/test-scripts.sh

      - name: Cook gate contract tests
        run: bash .claude/skills/cook/scripts/test-scripts.sh

      - name: Fix skill contract tests
        run: bash tests/fix-skill-contract.test.sh

      - name: Docs-finder offline tests
        run: node .claude/skills/docs-finder/scripts/tests/run-tests.js

      - name: Intake ticket sanitizer tests
        run: node .claude/skills/intake/scripts/sanitize-ticket.test.cjs

      - name: Validate rubric schemas and presets
        run: bash .claude/skills/rubric/scripts/validate-rubric.sh

      - name: Hook-registration drift test
        run: bash tests/check-hook-registration.test.sh

      - name: Changed-files lint severity test
        run: bash tests/changed-files-lint.test.sh

      - name: Surface contract test
        run: bash tests/surface-contract.test.sh

      - name: Git index audit test
        run: bash tests/git-index-audit.test.sh

      - name: mk:help skill contract test
        run: bash tests/help-skill-contract.test.sh

      - name: Smoke-test memory CLI
        run: |
          node packages/mewkit/dist/index.js memory validate
          node packages/mewkit/dist/index.js memory render-views

      - name: Setup Python venv
        run: |
          python3 -m venv .claude/skills/.venv
          .claude/skills/.venv/bin/pip install --quiet pyyaml jsonschema pytest

      - name: Multimodal mock tests
        run: .claude/skills/.venv/bin/python3 .claude/skills/multimodal/scripts/tests/run_tests.py

      - name: Validate Figma evidence packet fixtures
        run: .claude/skills/.venv/bin/python3 .claude/skills/figma/evals/validate-evidence-packets.py

      - name: Test web-to-markdown URL SSRF guard
        run: |
          .claude/skills/.venv/bin/pip install --quiet -r .claude/skills/web-to-markdown/scripts/requirements.txt
          .claude/skills/.venv/bin/python3 -m pytest \
            .claude/skills/web-to-markdown/tests/test_safe_url.py \
            .claude/skills/web-to-markdown/tests/test_e2e_offline.py -q

      - name: Validate plan-creator compatibility fixtures
        run: bash tests/fixtures/plan-creator/validate-fixtures.sh

      - name: Validate skill-creator fixtures
        run: bash tests/fixtures/skill-creator/validate-fixtures.sh

      - name: Story-sizer deterministic tests
        run: bash tests/story-sizer-all.test.sh

      - name: Routing eval (Track D, EN + VI)
        run: .claude/skills/.venv/bin/python3 .claude/skills/scale-routing/eval/run-routing-eval.py

      - name: Validate skill cross-refs
        run: bash scripts/check-skill-cross-refs.sh

      - name: Validate hook registration
        run: bash scripts/check-hook-registration.sh

      - name: Validate hook shell consistency
        run: bash scripts/check-hook-shell-consistency.sh

      - name: Validate workflow spec drift
        run: node packages/mewkit/dist/index.js validate --workflow

      - name: Validate gate-authority contract
        run: node packages/mewkit/dist/index.js validate --gates

      # plugin/ is generated from .claude/. Regenerate into a scratch dir and
      # diff: catches both a forgotten regenerate (plugin ships stale behavior)
      # and a hand-edit (the next build silently discards it).
      - name: Validate plugin parity
        run: node packages/mewkit/dist/index.js validate --parity

      - name: Validate artifact ownership metadata
        run: node packages/mewkit/dist/index.js validate --ownership

      - name: Validate declared agent contracts
        run: node packages/mewkit/dist/index.js validate --agents

      - name: Validate pack manifest coherence + safety invariant
        run: node packages/mewkit/dist/index.js validate --packs

      - name: Validate responsibility substrate (tagging + view drift)
        run: node packages/mewkit/dist/index.js validate --substrate

      - name: Validate plugin namespace + manifest contract
        run: node packages/mewkit/dist/index.js validate --plugin

      # Guardrail, not a tight bound. Measured core ~104.7k tokens; cap = 131000
      # (~25% headroom). Re-baseline with `mewkit budget context --profile core`
      # and bump this number when core legitimately grows.
      - name: Validate core context budget stays small
        run: node packages/mewkit/dist/index.js budget context --profile core --fail-over 131000

      - name: Validate README, website, and index counts (stale-index)
        run: node packages/mewkit/dist/index.js inventory --check

      - name: Verify high-traffic dependency metadata
        run: node scripts/scan-skill-dependency-edges.mjs --check-high-traffic

      - name: Report generic-core provider vocabulary baseline
        run: node scripts/core-skill-token-baseline.cjs

      - name: Lint website terminology
        run: node scripts/terminology-linter.cjs

      - name: Validate skill frontmatter
        run: .claude/skills/.venv/bin/python3 scripts/validate-skill-frontmatter.py

      - name: Validate docs references on Type-1 allowlist
        run: python3 .claude/scripts/check-docs-references.py .claude

      - name: Unit-test docs-references validator
        run: python3 .claude/scripts/tests/test-check-docs-references.py

      - name: Unit-test skill-frontmatter validator
        run: .claude/skills/.venv/bin/python3 .claude/scripts/tests/test-validate-skill-frontmatter.py

      - name: Validate rule availability
        run: bash scripts/validate-rule-availability.sh

      # Diff-mode brand-prose lint: violations in PR-changed files fail; pre-existing
      # legacy violations in untouched files are WARN-only. Needs a base ref — resolve
      # it from the PR base branch (guarded to PR events that set GITHUB_BASE_REF).
      - name: Resolve lint base ref
        if: github.base_ref != ''
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF" || true
          BASE="$(git merge-base "origin/$GITHUB_BASE_REF" HEAD 2>/dev/null || true)"
          if [ -n "$BASE" ]; then echo "LINT_BASE_REF=$BASE" >> "$GITHUB_ENV"; fi

      - name: Lint brand prose in changed .claude markdown (diff mode)
        run: LINT_MODE=diff bash .claude/scripts/lint-brand-prose.sh

      - name: "Reject residual meow: namespace"
        run: |
          if grep -rEn '^name:[[:space:]]*meow:' .claude/skills/*/SKILL.md; then
            echo "ERROR: legacy 'meow:' frontmatter found — use 'mk:' instead." >&2
            exit 1
          fi
          if grep -rEn '/meow:[a-z]' .claude/commands/ .claude/rules/ CLAUDE.md 2>/dev/null; then
            echo "ERROR: legacy '/meow:' slash references found — use '/mk:' instead." >&2
            exit 1
          fi

      - name: Hook regression tests
        run: node --test .claude/hooks/__tests__/*.test.cjs

      - name: Generate skill evaluation results
        run: node scripts/generate-eval-results.cjs "$RUNNER_TEMP/skill-eval-results.md"

      - name: Publish skill evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-results
          path: ${{ runner.temp }}/skill-eval-results.md
          if-no-files-found: error
