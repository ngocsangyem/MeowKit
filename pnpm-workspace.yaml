packages:
  - "packages/*"

# esbuild's native binary is required for Vitest/Vite TypeScript transform.
# The other flagged postinstall scripts (@parcel/watcher, sharp, vue-demi) are
# not needed to build or test this repo, so they stay unbuilt.
onlyBuiltDependencies:
  - esbuild

ignoredBuiltDependencies:
  - "@parcel/watcher"
  - sharp
  - vue-demi

allowBuilds:
  '@parcel/watcher': set this to true or false
  esbuild: set this to true or false
  sharp: set this to true or false
  vue-demi: set this to true or false
