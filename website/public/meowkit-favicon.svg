<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38F9FF"/>
      <stop offset="100%" stop-color="#A020F0"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0F172A"/>
  <!-- Cat ears -->
  <polygon points="17,24 12,6 24,19" fill="#1E293B" stroke="url(#fg)" stroke-width="1.2"/>
  <polygon points="47,24 52,6 40,19" fill="#1E293B" stroke="url(#fg)" stroke-width="1.2"/>
  <!-- Head -->
  <ellipse cx="32" cy="32" rx="17" ry="15" fill="#1E293B"/>
  <!-- Eyes -->
  <g filter="url(#g)">
    <ellipse cx="25" cy="30" rx="4" ry="3.5" fill="#0F172A" stroke="#38F9FF" stroke-width="0.8"/>
    <ellipse cx="25" cy="30" rx="2" ry="3" fill="#38F9FF" opacity="0.85"/>
    <ellipse cx="39" cy="30" rx="4" ry="3.5" fill="#0F172A" stroke="#38F9FF" stroke-width="0.8"/>
    <ellipse cx="39" cy="30" rx="2" ry="3" fill="#38F9FF" opacity="0.85"/>
  </g>
  <!-- Nose -->
  <polygon points="32,36 30,39 34,39" fill="#A020F0" opacity="0.7"/>
  <!-- Whiskers -->
  <g stroke="url(#fg)" stroke-width="0.6" opacity="0.4" stroke-linecap="round">
    <line x1="18" y1="34" x2="6" y2="31"/>
    <line x1="18" y1="37" x2="5" y2="38"/>
    <line x1="46" y1="34" x2="58" y2="31"/>
    <line x1="46" y1="37" x2="59" y2="38"/>
  </g>
  <!-- Corner sparkle -->
  <circle cx="54" cy="10" r="1.5" fill="#A020F0" opacity="0.6"/>
  <circle cx="10" cy="54" r="1" fill="#38F9FF" opacity="0.5"/>
</svg>
