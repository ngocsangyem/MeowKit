<!-- block: data-model (sentinel .vp-data-model). CONDITIONAL — emit only when the plan
     defines a schema / entity / table. Binds to: schema/entity/table content in the plan.
     One .wf-box per entity; fields as a simple table. Field names/types are plan DATA — entity-encode them.
     Tokens/classes only — no hex, no font-family. -->
<section class="vp-section vp-data-model">
  <h2>Data model</h2>
  <div class="vp-data-model-grid">

    <div class="wf-box">
      <h3>{ENTITY_NAME}</h3>
      <table class="vp-fields">
        <thead><tr><th>Field</th><th>Type</th><th>Notes</th></tr></thead>
        <tbody>
          <tr><td>{FIELD}</td><td>{TYPE}</td><td class="wf-muted">{NOTE}</td></tr>
          <!-- repeat per field -->
        </tbody>
      </table>
    </div>

    <!-- repeat .wf-box per entity -->

  </div>
</section>
