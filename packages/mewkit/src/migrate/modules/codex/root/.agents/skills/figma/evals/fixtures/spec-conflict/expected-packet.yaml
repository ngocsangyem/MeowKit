# Expected Figma Evidence Packet — spec-conflict fixture.
# Schema oracle. Prototype flow is EXTRACTED but CONFLICTS with route + spec.
# mk:figma records evidence + ledger data; it does NOT adjudicate or set blocked_on.
# Paths use the toolkit convention (tasks/plans, tasks/reports).
schema_version: figma-evidence-packet/v1
source:
  figma_url: "https://www.figma.com/design/FIX0CONFLICT/meowkit-fixtures?node-id=40-2"
  file_key: FIX0CONFLICT
  node_ids: ["40:2", "40:20", "40:23", "40:50"]
  figma_version_or_last_modified: "2026-07-05T09:30:00Z"
  extracted_at: "<ISO-8601>"
scope:
  target_frames: ["Members", "InviteModal"]
  frame_sizes:
    - { node_id: "40:2", width: 1440, height: 900 }
    - { node_id: "40:20", width: 480, height: 420 }
intent_summary:
  hierarchy:
    - "Members screen → InviteModal → Submit (prototype navigates to /settings/members)"
  layout_constraints:
    - "same invite surface as interaction-modal"
  tokens: "inherits invite-surface tokens"
  assets: []
  variants_and_states: "default/focus/error/loading (explicit)"
prototype_flow_summary:
  availability: extracted          # explicit prototype edge exists on submit
  confidence: high                 # extraction confidence high; correctness is disputed
  flow_starting_points:
    - { name: "Submit → /settings/members", node_id: "40:23" }
  critical_actions_count: 1        # Submit = route change + server mutation
  blocked_or_needs_answer_count: 1 # conflict with route + spec
  prototype_flow_artifacts:
    report_md: "tasks/plans/<active-plan>/research/prototype-flow-report.md"
    graph_json: "tasks/plans/<active-plan>/research/prototype-flow.json"
    explorer_html: "optional, only when plan --html is requested"
implementation_hints:
  component_candidates: ["InviteModal (40:20)"]
  code_connect_refs: []
validation_contract:
  required_viewports: [desktop]
  required_states: [default, focus, error, loading]
  pixel_tolerance: "advisory only"
  a11y_expectations: "modal focus trap; submit reflects loading state"
risks:
  ambiguity:
    - "prototype submit navigates to /settings/members, but existing route keeps user in modal AND Jira MEOW-412 says stay in modal — high-risk conflict, no silent winner"
  missing_states: []
  permission_limits: []
# Flow Ambiguity Ledger entry mk:figma writes into prototype-flow.json / report
# (adjudication + blocked_on belongs to mk:plan-creator, NOT here):
flow_ambiguity_ledger:
  - id: F1
    source: prototype-flow.json
    action: "Invite submit navigation target"
    ambiguity: "Figma prototype navigates to /settings/members; existing route + Jira MEOW-412 say stay in modal"
    risk_level: high
    evidence_sources: [figma_prototype, existing_route, jira_ticket]
    inferred_flow: null
    decision_needed: "Does submit navigate to /settings/members or stay in modal with inline success?"
    phase_impact: "<invite-flow phase>"
    status: needs-answer
provenance:
  generated_by: mk:figma
  tool_surface: "Figma MCP | screenshot fallback"
  artifact_paths:
    - "tasks/plans/<active-plan>/research/figma-evidence-packet.md"
    - "tasks/plans/<active-plan>/research/prototype-flow-report.md"
    - "tasks/plans/<active-plan>/research/prototype-flow.json"
artifact_policy:
  active_plan_location: "tasks/plans/<active-plan>/research/"
  standalone_location: "tasks/reports/"
  artifact_paths_only_in_context: true
