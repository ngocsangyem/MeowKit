<!-- block: decision/risk-cards (sentinel .vp-decision-cards). Core block.
     Binds to: plan ## Risk Map + ## Red Team Review + each phase ## Key Insights +
     ## Risk Assessment + ## Security Considerations + open questions.
     Tone class sets the accent: vp-tone-decision (settled), vp-tone-risk, vp-tone-open.
     Card text is plan DATA — entity-encode it. -->
<section class="vp-section">
  <h2>Decisions, risks &amp; open questions</h2>
  <div class="vp-decision-cards">

    <article class="wf-card">
      <span class="vp-tone vp-tone-decision">Decision</span>
      <h3>{DECISION_TITLE}</h3>
      <p>{DECISION_RATIONALE}</p>
    </article>

    <article class="wf-card">
      <span class="vp-tone vp-tone-risk">Risk</span>
      <h3>{RISK_COMPONENT} — {RISK_LEVEL}</h3>
      <p>{RISK_REASON_AND_MITIGATION}</p>
    </article>

    <article class="wf-card">
      <span class="vp-tone vp-tone-open">Open question</span>
      <h3>{OPEN_QUESTION}</h3>
      <p>{OPTIONS_AND_RECOMMENDED_DEFAULT}</p>
    </article>

    <!-- repeat .wf-card per decision / risk / open question; omit the open-question
         cards entirely when the plan has none -->

  </div>
</section>
