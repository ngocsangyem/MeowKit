<!-- block: api-endpoint (sentinel .vp-api-endpoint). CONDITIONAL — emit only when the plan
     defines an API / endpoint / request-response contract. Binds to: API/endpoint content in the plan.
     One .wf-box per endpoint: method + path, then request/response shape. Paths and payloads are
     plan DATA — entity-encode them. Tokens/classes only — no hex, no font-family. -->
<section class="vp-section vp-api-endpoint">
  <h2>API endpoints</h2>

  <div class="wf-box vp-endpoint">
    <div class="vp-endpoint-head">
      <span class="wf-pill accent">{METHOD}</span>
      <code class="vp-endpoint-path">{PATH}</code>
    </div>
    <p class="wf-muted">{PURPOSE}</p>
    <div class="vp-endpoint-io">
      <div><strong>Request</strong><pre class="vp-payload">{REQUEST_SHAPE}</pre></div>
      <div><strong>Response</strong><pre class="vp-payload">{RESPONSE_SHAPE}</pre></div>
    </div>
  </div>

  <!-- repeat .vp-endpoint per endpoint -->

</section>
