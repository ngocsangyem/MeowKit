<!-- block: wireframe-screen (sentinel .vp-wireframe). FLAG-GATED — emit only with --wireframe.
     Authored per references/wireframe-rules.md. Set data-surface to match the real footprint
     (browser | desktop | mobile | popover | panel). Body is plain semantic HTML laid out with
     inline flex/grid, helper classes, --wf-* tokens, and data-icon markers — no hex, no font-family,
     no fixed pixel width/height on the frame (the template's [data-surface] rules own the footprint).
     Name each screen with .vp-screen-label above the frame, never inside it. -->
<section class="vp-section vp-wireframe">
  <h2>Screens</h2>

  <div>
    <span class="vp-screen-label">{SCREEN_NAME}</span>
    <div class="vp-screen" data-surface="{SURFACE}">
      <div class="vp-screen-body" style="display:flex;flex-direction:column;gap:12px;padding:16px;height:100%">

        <div style="display:flex;align-items:center;justify-content:space-between">
          <h1 style="margin:0;font-size:20px">{SCREEN_TITLE}</h1>
          <button class="primary">{PRIMARY_ACTION}</button>
        </div>

        <div style="display:flex;gap:6px">
          <span class="wf-pill accent">{FILTER_ACTIVE}</span>
          <span class="wf-pill">{FILTER_OTHER}</span>
        </div>

        <div class="wf-card" style="flex:1;display:flex;flex-direction:column;gap:10px">
          <label>Search <input value="{SAMPLE_VALUE}" /></label>
          <p class="wf-muted" style="margin:0">{REAL_BODY_CONTENT}</p>
        </div>

      </div>
    </div>
  </div>

  <!-- repeat the labelled .vp-screen per screen the plan describes -->

</section>
