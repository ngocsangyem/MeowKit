<!-- block: file-map (sentinel .vp-file-map). Core block.
     Binds to: each phase ## Related Code Files (Files to Create / Modify / Read).
     Group by action so the blast radius is visible. File paths are plan DATA — entity-encode them.
     Drop a group if the plan lists none for it. -->
<section class="vp-section">
  <h2>Files touched</h2>
  <div class="vp-file-map">

    <div class="wf-box">
      <h3 class="vp-tag-create">Create</h3>
      <ul>
        <li>{CREATE_PATH}</li>
        <!-- repeat per created file -->
      </ul>
    </div>

    <div class="wf-box">
      <h3 class="vp-tag-modify">Modify</h3>
      <ul>
        <li>{MODIFY_PATH}</li>
        <!-- repeat per modified file -->
      </ul>
    </div>

    <div class="wf-box">
      <h3 class="vp-tag-read">Read</h3>
      <ul>
        <li>{READ_PATH}</li>
        <!-- repeat per read-for-context file -->
      </ul>
    </div>

  </div>
</section>
