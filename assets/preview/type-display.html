<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Type — Display Specimen</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 22px 24px; }
  .eyebrow { font-family: var(--mk-font-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--mk-accent-glow); margin-bottom: 10px; }
  .display { font-size: 56px; font-weight: 400; letter-spacing: .02em; line-height: 1.05; background: var(--mk-gradient-brand); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color: transparent; margin: 0; }
  .meta { margin-top: 14px; font-family: var(--mk-font-mono); font-size: 11px; color: var(--mk-fg-2); letter-spacing: .04em; }
</style>
</head>
<body>
  <div class="eyebrow">Display · Inter 400 · gradient clip</div>
  <h1 class="display">Enforced discipline for&nbsp;AI&nbsp;coding&nbsp;agents.</h1>
  <div class="meta">Inter 400 · 56 / 1.05 · letter-spacing 0.02em · linear-gradient(135°, #2563EB, #60A5FA)</div>
</body>
</html>
