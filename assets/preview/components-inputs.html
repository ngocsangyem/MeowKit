<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Components — Inputs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
  .field { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--mk-border-subtle); border-radius: 6px; background: var(--mk-bg-surface); }
  .field.focus { border-color: var(--mk-accent-glow); box-shadow: 0 0 0 3px rgba(96,165,250,.35); }
  .field .ic { color: var(--mk-fg-3); font-family: var(--mk-font-mono); font-size: 14px; }
  .field input { background: transparent; border: 0; outline: 0; color: var(--mk-fg-1); font: inherit; flex: 1; font-size: 14px; }
  .field input::placeholder { color: var(--mk-fg-3); }
  .kbd { font-family: var(--mk-font-mono); font-size: 11px; padding: 2px 6px; border-radius: 4px; background: rgba(148,163,184,.14); color: var(--mk-fg-2); border: 1px solid var(--mk-border-subtle); }
  .row { display: flex; gap: 12px; align-items: center; }
  .lbl { font-family: var(--mk-font-mono); font-size: 10.5px; color: var(--mk-fg-2); letter-spacing: .1em; text-transform: uppercase; width: 70px; }
  .sel { display:inline-flex; align-items:center; gap:6px; background: rgba(37,99,235,.14); color: var(--mk-accent-glow); border: 1px solid rgba(96,165,250,.3); border-radius: 6px; padding: 6px 10px; font-size: 13px; }
</style>
</head>
<body>
  <div class="row"><div class="lbl">default</div>
    <div class="field" style="flex:1"><span class="ic">⌕</span><input placeholder="Search docs…" /><span class="kbd">⌘ K</span></div>
  </div>
  <div class="row"><div class="lbl">focus</div>
    <div class="field focus" style="flex:1"><span class="ic">⌕</span><input value="mk:plan-creator" /><span class="kbd">enter</span></div>
  </div>
  <div class="row"><div class="lbl">select</div>
    <div class="sel">Tier · STANDARD <span style="opacity:.6">▾</span></div>
    <div class="sel" style="background:rgba(247,144,9,.14); color:#F79009; border-color:rgba(247,144,9,.3)">Mode · strict <span style="opacity:.6">▾</span></div>
  </div>
</body>
</html>
