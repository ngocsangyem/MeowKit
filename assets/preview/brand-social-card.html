<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: var(--mk-bg-base); padding: 18px; font-family: var(--mk-font-sans); }
  .og {
    aspect-ratio: 1200 / 628;
    width: 100%;
    background: var(--mk-gradient-space);
    border-radius: var(--mk-radius-md);
    padding: 30px 36px;
    position: relative;
    overflow: hidden;
    color: #fff;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .og::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(1px 1px at 18% 28%, rgba(255,255,255,.45), transparent 100%),
      radial-gradient(1px 1px at 72% 18%, rgba(255,255,255,.3), transparent 100%),
      radial-gradient(1px 1px at 38% 78%, rgba(255,255,255,.35), transparent 100%),
      radial-gradient(1px 1px at 85% 62%, rgba(255,255,255,.28), transparent 100%),
      radial-gradient(2px 2px at 58% 40%, rgba(96,165,250,.55), transparent 100%);
    pointer-events: none;
  }
  .og > * { position: relative; z-index: 1; }
  .logo {
    display: inline-flex; align-items: baseline;
    font-family: 'Fira Code', ui-monospace, monospace;
    font-size: 20px; font-weight: 500; color: rgba(255,255,255,.9);
  }
  .logo .slash { color: var(--mk-accent-glow); font-weight: 600; }
  .logo .caret { display: inline-block; width: 2px; height: 18px; background: var(--mk-accent-glow); margin-left: 4px; }

  .eyebrow { font-family: 'Fira Code', monospace; font-size: 12px; letter-spacing: .18em; color: var(--mk-accent-glow); text-transform: uppercase; margin-bottom: 10px; }
  .title {
    font-family: 'Inter', sans-serif; font-weight: 400;
    font-size: 46px; line-height: 1.1; letter-spacing: .01em; margin: 0; max-width: 82%;
    background: linear-gradient(135deg, #fff 0%, #93C5FD 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .footer { display: flex; align-items: center; gap: 14px; font-family: 'Fira Code', monospace; font-size: 13px; color: rgba(255,255,255,.7); }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 9999px;
    background: rgba(37,99,235,.22); border: 1px solid rgba(96,165,250,.35);
    color: var(--mk-accent-soft);
  }
  .chip .s { color: var(--mk-accent-glow); font-weight: 600; }
  .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.35); }
</style>
</head>
<body>
  <div class="og">
    <span class="logo"><span class="slash">/</span>meow<span class="caret"></span></span>
    <div>
      <div class="eyebrow">AI AGENT TOOLKIT · CLAUDE CODE</div>
      <h2 class="title">Ship production code<br>without breaking gates.</h2>
    </div>
    <div class="footer">
      <span class="chip"><span class="s">/</span>meow:cook</span>
      <span>skills</span><span class="dot"></span>
      <span>agents</span><span class="dot"></span>
      <span>hard gates</span>
    </div>
  </div>
</body>
</html>
