<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: var(--mk-bg-base); padding: 22px 24px; font-family: var(--mk-font-sans); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .tile { background: var(--mk-neutral-0); border: 1px solid var(--mk-border-subtle); border-radius: var(--mk-radius-md); padding: 22px 20px 14px; display: flex; flex-direction: column; gap: 10px; min-height: 110px; justify-content: center; position: relative; }
  .tile .tag { position: absolute; top: 10px; left: 14px; font-family: 'Fira Code', monospace; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--mk-neutral-500); }

  .word { font-family: 'Inter', sans-serif; font-size: 44px; line-height: 1; letter-spacing: -.01em; }

  .w-gradient {
    font-weight: 500;
    background: var(--mk-gradient-brand);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .w-dual { font-weight: 500; color: var(--mk-neutral-900); }
  .w-dual .kit { color: var(--mk-blue-600); }

  .prompt {
    font-family: 'Fira Code', monospace; font-size: 38px; font-weight: 500;
    display: inline-flex; align-items: baseline;
  }
  .prompt .slash { color: var(--mk-blue-600); font-weight: 600; }
  .prompt .body { color: var(--mk-neutral-900); }

  .ascii {
    font-family: 'Fira Code', monospace; font-size: 36px; color: var(--mk-neutral-900);
    letter-spacing: 2px;
  }
  .ascii .brack { color: var(--mk-blue-600); }
</style>
</head>
<body>
  <div class="tile">
    <span class="tag">GRADIENT WORDMARK</span>
    <span class="word w-gradient">MeowKit</span>
  </div>
  <div class="tile">
    <span class="tag">DUAL-TONE</span>
    <span class="word w-dual">Meow<span class="kit">Kit</span></span>
  </div>
  <div class="tile">
    <span class="tag">PROMPT · /MEOW:KIT</span>
    <span class="prompt"><span class="slash">/</span><span class="body">mk:kit</span></span>
  </div>
  <div class="tile">
    <span class="tag">ASCII CAT · =^··^=</span>
    <span class="ascii"><span class="brack">=</span>^··^<span class="brack">=</span></span>
  </div>
</body>
</html>
