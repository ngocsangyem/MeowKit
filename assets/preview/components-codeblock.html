<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Components — Code Block</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 18px 24px; }
  .wrap { border: 1px solid var(--mk-border-subtle); border-radius: 10px; overflow: hidden; background: var(--mk-bg-surface); }
  .bar { display:flex; align-items:center; justify-content:space-between; padding: 6px 12px; border-bottom: 1px solid var(--mk-border-subtle); font-family: var(--mk-font-mono); font-size: 11px; color: var(--mk-fg-2); letter-spacing: .06em; text-transform: uppercase; }
  .bar .copy { color: var(--mk-fg-3); font-size: 11px; }
  pre { margin: 0; padding: 14px 16px; font-family: var(--mk-font-mono); font-size: 13px; line-height: 1.65; color: var(--mk-fg-1); overflow:auto; }
  .k { color: #93C5FD; }
  .s { color: #12B76A; }
  .c { color: var(--mk-fg-2); }
  .v { color: #F79009; }
  .p { color: #F8FAFC; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="bar"><span>bash</span><span class="copy">⧉ copy</span></div>
<pre><span class="c"># Install MeowKit in 30 seconds</span>
<span class="k">npx</span> mewkit init
<span class="k">npx</span> mewkit setup      <span class="c"># venv, MCP, .env, .gitignore</span>
<span class="k">npx</span> mewkit doctor     <span class="c"># verify environment</span>

<span class="c"># Your first task</span>
<span class="k">npx</span> mewkit task new <span class="v">--type</span> feature <span class="s">"add auth"</span>
<span class="p">/meow:cook</span>                <span class="c">→ Plan · Test · Build · [GATE 2] · Ship</span></pre>
  </div>
</body>
</html>
