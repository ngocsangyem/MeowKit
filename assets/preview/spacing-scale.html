<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Spacing — Scale</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 20px 24px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
  .tag { width: 80px; font-family: var(--mk-font-mono); font-size: 11px; color: var(--mk-fg-2); letter-spacing: .04em; }
  .bar { height: 14px; background: var(--mk-accent-glow); border-radius: 3px; box-shadow: 0 0 14px rgba(96,165,250,.35); }
  .px { margin-left: auto; font-family: var(--mk-font-mono); font-size: 11px; color: var(--mk-fg-2); }
</style>
</head>
<body>
  <div class="row"><div class="tag">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="tag">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="tag">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="tag">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="tag">space-6</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="tag">space-8</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="tag">space-12</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="tag">space-16</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body>
</html>
