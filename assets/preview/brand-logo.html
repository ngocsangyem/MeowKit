<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 28px 32px; display: flex; align-items: center; gap: 40px; }
  .mark {
    display: inline-flex; align-items: baseline;
    font-family: var(--mk-font-mono);
    font-size: 72px; font-weight: 500; line-height: 1; letter-spacing: -.01em;
  }
  .mark .slash { color: var(--mk-blue-600); font-weight: 600; margin-right: 2px; }
  .mark .meow {
    background: linear-gradient(135deg, var(--mk-blue-700) 0%, var(--mk-blue-500) 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .mark .caret { display: inline-block; width: 6px; height: 64px; background: var(--mk-blue-600); margin-left: 10px; transform: translateY(6px); animation: blink 1.1s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .meta { display: flex; flex-direction: column; gap: 4px; }
  .meta h1 { font-size: 20px; font-weight: 500; margin: 0; color: var(--mk-neutral-900); }
  .meta p  { font-family: var(--mk-font-mono); font-size: 12px; color: var(--mk-neutral-500); margin: 0; letter-spacing: .06em; }
</style>
</head>
<body>
  <span class="mark"><span class="slash">/</span><span class="meow">meow</span><span class="caret"></span></span>
  <div class="meta">
    <h1>Primary mark</h1>
    <p>SLASH-MEOW PROMPT · FIRA CODE 500 · GRADIENT #2563EB → #60A5FA</p>
  </div>
</body>
</html>
