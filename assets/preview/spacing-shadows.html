<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Spacing — Shadows &amp; Glow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 28px 24px; display: flex; gap: 22px; justify-content: space-between; align-items: center; }
  .tile { flex: 1; height: 90px; background: var(--mk-bg-surface); border: 1px solid var(--mk-border-subtle); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .n { font-size: 12.5px; font-weight: 500; }
  .v { font-family: var(--mk-font-mono); font-size: 10.5px; color: var(--mk-fg-2); letter-spacing: .04em; }
  .s-card { box-shadow: 0 2px 8px rgba(15,23,42,.06), 0 1px 2px rgba(15,23,42,.04); }
  .s-lift { box-shadow: 0 8px 24px rgba(15,23,42,.35); }
  .s-glow { box-shadow: 0 0 20px rgba(37,99,235,.35); border-color: rgba(96,165,250,.3); }
  .s-glow-s { box-shadow: 0 0 40px rgba(37,99,235,.55); border-color: rgba(96,165,250,.5); }
  .s-inset { box-shadow: inset 0 0 0 1px rgba(96,165,250,.35); }
</style>
</head>
<body>
  <div class="tile s-card"><div class="n">card</div><div class="v">soft light-mode</div></div>
  <div class="tile s-lift"><div class="n">lift</div><div class="v">modal · 8·24</div></div>
  <div class="tile s-glow"><div class="n">glow</div><div class="v">primary · .35</div></div>
  <div class="tile s-glow-s"><div class="n">glow-strong</div><div class="v">focus · .55</div></div>
  <div class="tile s-inset"><div class="n">inset-glow</div><div class="v">feature hover</div></div>
</body>
</html>
