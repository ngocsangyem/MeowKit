<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<title>Components — Navbar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { font-family: var(--mk-font-sans); background: var(--mk-bg-base); color: var(--mk-fg-1); padding: 24px; }
  .nav { height: 56px; display:flex; align-items:center; gap: 18px; padding: 0 18px; background: rgba(15,23,42,.85); backdrop-filter: blur(12px); border: 1px solid var(--mk-border-subtle); border-radius: 12px; }
  .brand { display:flex; align-items:center; gap: 10px; font-weight: 500; font-size: 17px; letter-spacing: .02em; }
  .mk-logo { font-family: var(--mk-font-mono); font-weight: 500; font-size: 16px; margin-right: 4px; display: inline-flex; align-items: baseline; color: var(--mk-neutral-0); }
  .mk-logo .s { color: var(--mk-accent-glow); font-weight: 600; margin-right: 1px; }
  .mk-logo .c { display: inline-block; width: 2px; height: 14px; background: var(--mk-accent-glow); margin-left: 3px; transform: translateY(2px); }
  .links { display:flex; gap: 18px; margin-left: 12px; font-size: 14px; }
  .links a { color: var(--mk-fg-2); text-decoration: none; transition: color .15s; }
  .links a.active { color: var(--mk-accent-glow); }
  .links a:hover { color: var(--mk-accent-glow); }
  .spacer { flex: 1; }
  .search { display:flex; align-items:center; gap: 8px; padding: 6px 10px; border: 1px solid var(--mk-border-subtle); border-radius: 6px; font-size: 13px; color: var(--mk-fg-3); min-width: 180px; background: var(--mk-bg-surface); }
  .kbd { font-family: var(--mk-font-mono); font-size: 11px; padding: 1px 5px; border-radius: 3px; background: rgba(148,163,184,.14); color: var(--mk-fg-2); border: 1px solid var(--mk-border-subtle); margin-left: auto; }
  .iconbtn { width: 32px; height: 32px; display:grid; place-items:center; border-radius: 6px; color: var(--mk-fg-2); font-family: var(--mk-font-mono); font-size: 14px; cursor: pointer; }
  .iconbtn:hover { background: rgba(37,99,235,.08); color: var(--mk-accent-glow); }
</style>
</head>
<body>
  <div class="nav">
    <div class="brand"><span class="mk-logo"><span class="s">/</span>meow<span class="c"></span></span>MeowKit</div>
    <div class="links">
      <a href="#" class="active">Guide</a>
      <a href="#">Workflows</a>
      <a href="#">Reference</a>
      <a href="#">CLI</a>
      <a href="#">Cheatsheet</a>
    </div>
    <div class="spacer"></div>
    <div class="search"><span>⌕</span>Search <span class="kbd">⌘K</span></div>
    <div class="iconbtn">◐</div>
    <div class="iconbtn">⎋</div>
  </div>
</body>
</html>
