<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#131C33"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38F9FF"/>
      <stop offset="100%" stop-color="#A020F0"/>
    </linearGradient>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38F9FF"/>
      <stop offset="100%" stop-color="#A020F0"/>
    </linearGradient>
    <filter id="glow-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Circuit pattern for background -->
    <pattern id="bg-circuits" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="30" x2="30" y2="30" stroke="#38F9FF" stroke-width="0.3" opacity="0.15"/>
      <line x1="30" y1="0" x2="30" y2="30" stroke="#38F9FF" stroke-width="0.3" opacity="0.15"/>
      <circle cx="30" cy="30" r="1" fill="#38F9FF" opacity="0.2"/>
      <line x1="30" y1="30" x2="60" y2="30" stroke="#A020F0" stroke-width="0.3" opacity="0.1"/>
      <line x1="30" y1="30" x2="30" y2="60" stroke="#A020F0" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg-grad)"/>
  <rect width="1200" height="400" fill="url(#bg-circuits)"/>

  <!-- Decorative circuit lines -->
  <g stroke="#38F9FF" stroke-width="0.5" opacity="0.15" fill="none">
    <path d="M0,100 L100,100 L150,150 L300,150"/>
    <path d="M0,300 L80,300 L120,260 L200,260"/>
    <path d="M900,80 L1000,80 L1050,130 L1200,130"/>
    <path d="M950,320 L1050,320 L1100,280 L1200,280"/>
  </g>
  <g stroke="#A020F0" stroke-width="0.5" opacity="0.1" fill="none">
    <path d="M0,200 L60,200 L90,170"/>
    <path d="M1100,200 L1200,200"/>
    <path d="M1000,350 L1060,350 L1090,380 L1200,380"/>
  </g>

  <!-- Sparkle particles -->
  <g opacity="0.5">
    <circle cx="80" cy="60" r="2" fill="#A020F0" filter="url(#glow-sm)"/>
    <circle cx="200" cy="340" r="1.5" fill="#38F9FF" filter="url(#glow-sm)"/>
    <circle cx="350" cy="80" r="1.5" fill="#A020F0" filter="url(#glow-sm)"/>
    <circle cx="500" cy="50" r="2" fill="#38F9FF" filter="url(#glow-sm)"/>
    <circle cx="700" cy="370" r="1.5" fill="#A020F0" filter="url(#glow-sm)"/>
    <circle cx="850" cy="60" r="2" fill="#38F9FF" filter="url(#glow-sm)"/>
    <circle cx="1000" cy="350" r="1.5" fill="#A020F0" filter="url(#glow-sm)"/>
    <circle cx="1120" cy="90" r="2" fill="#38F9FF" filter="url(#glow-sm)"/>
    <circle cx="1150" cy="310" r="1.5" fill="#A020F0" filter="url(#glow-sm)"/>
  </g>

  <!-- Cat icon (compact version, left side) -->
  <g transform="translate(160, 200) scale(0.65)" filter="url(#glow-lg)">
    <!-- Ears -->
    <polygon points="0,-120 -40,-220 40,-160" fill="#1E293B" stroke="url(#brand-grad)" stroke-width="2.5"/>
    <polygon points="120,-120 80,-160 160,-220" fill="#1E293B" stroke="url(#brand-grad)" stroke-width="2.5"/>
    <!-- Inner ears -->
    <polygon points="5,-115 -28,-200 38,-158" fill="none" stroke="#A020F0" stroke-width="1" opacity="0.4"/>
    <polygon points="115,-115 82,-158 148,-200" fill="none" stroke="#A020F0" stroke-width="1" opacity="0.4"/>
    <!-- Head -->
    <ellipse cx="60" cy="-60" rx="95" ry="85" fill="#1E293B"/>
    <!-- Circuit lines on face -->
    <g stroke="#38F9FF" stroke-width="0.8" opacity="0.2" fill="none">
      <path d="M5,-30 L20,-20 L20,0"/>
      <path d="M115,-30 L100,-20 L100,0"/>
      <path d="M60,-50 L60,-30 L48,-18"/>
      <circle cx="20" cy="0" r="1.5" fill="#38F9FF"/>
      <circle cx="100" cy="0" r="1.5" fill="#38F9FF"/>
    </g>
    <!-- Eyes -->
    <g filter="url(#glow-sm)">
      <ellipse cx="28" cy="-55" rx="18" ry="15" fill="#0F172A" stroke="#38F9FF" stroke-width="2"/>
      <ellipse cx="28" cy="-55" rx="9" ry="13" fill="#38F9FF" opacity="0.8"/>
      <ellipse cx="28" cy="-55" rx="3.5" ry="12" fill="#FFF" opacity="0.3"/>
      <ellipse cx="92" cy="-55" rx="18" ry="15" fill="#0F172A" stroke="#38F9FF" stroke-width="2"/>
      <ellipse cx="92" cy="-55" rx="9" ry="13" fill="#38F9FF" opacity="0.8"/>
      <ellipse cx="92" cy="-55" rx="3.5" ry="12" fill="#FFF" opacity="0.3"/>
    </g>
    <!-- Nose -->
    <polygon points="60,-28 54,-18 66,-18" fill="#A020F0" opacity="0.7"/>
    <!-- Mouth -->
    <path d="M54,-18 Q40,0 32,-5" fill="none" stroke="#64748B" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M66,-18 Q80,0 88,-5" fill="none" stroke="#64748B" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Whiskers -->
    <g stroke="url(#brand-grad)" stroke-width="1" opacity="0.4" stroke-linecap="round">
      <line x1="-10" y1="-30" x2="-60" y2="-40"/>
      <line x1="-10" y1="-20" x2="-65" y2="-15"/>
      <line x1="-10" y1="-10" x2="-55" y2="10"/>
      <line x1="130" y1="-30" x2="180" y2="-40"/>
      <line x1="130" y1="-20" x2="185" y2="-15"/>
      <line x1="130" y1="-10" x2="175" y2="10"/>
    </g>
    <!-- Body hint -->
    <ellipse cx="60" cy="50" rx="70" ry="35" fill="#1E293B" opacity="0.7"/>
  </g>

  <!-- MeowKit text -->
  <text x="520" y="185" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="86" font-weight="800" fill="url(#text-grad)" letter-spacing="-2">
    MeowKit
  </text>

  <!-- Tagline -->
  <text x="522" y="230" font-family="'SF Pro Text', 'Inter', system-ui, sans-serif"
        font-size="22" fill="#CBD5E1" font-weight="400" letter-spacing="1">
    AI Agent Toolkit for Claude Code
  </text>

  <!-- Stats badges -->
  <g transform="translate(522, 260)">
    <!-- 40 Skills -->
    <rect x="0" y="0" width="90" height="28" rx="14" fill="rgba(56,249,255,0.12)" stroke="#38F9FF" stroke-width="0.8"/>
    <text x="45" y="19" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#38F9FF" font-weight="600">40 Skills</text>
    <!-- 13 Agents -->
    <rect x="100" y="0" width="100" height="28" rx="14" fill="rgba(160,32,240,0.12)" stroke="#A020F0" stroke-width="0.8"/>
    <text x="150" y="19" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#A020F0" font-weight="600">13 Agents</text>
    <!-- TDD + Security -->
    <rect x="210" y="0" width="120" height="28" rx="14" fill="rgba(56,249,255,0.08)" stroke="#334155" stroke-width="0.8"/>
    <text x="270" y="19" text-anchor="middle" font-family="'SF Mono', monospace" font-size="12" fill="#94A3B8" font-weight="500">TDD + Security</text>
  </g>

  <!-- Bottom gradient line -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#text-grad)" opacity="0.6"/>
</svg>
